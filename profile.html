<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - GROUND ZERO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #2c3e50, #4a6491);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            max-width: 1000px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #2c3e50, #4a6491);
            color: white;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        
        .header-left {
            display: flex;
            align-items: center;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo i {
            font-size: 2rem;
            color: #f10fd3;
        }
        
        .logo h1 {
            font-weight: 600;
            font-size: 1.8rem;
        }
        
        .street-light-logo {
            display: flex;
            align-items: center;
            margin-right: 10px;
        }
        
        .street-light-icon {
            font-size: 24px;
            color: #FFD700; /* Golden yellow for the light */
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
            animation: glow 2s infinite alternate;
        }
        
        @keyframes glow {
            from {
                text-shadow: 0 0 5px rgba(255, 215, 0, 0.7);
            }
            to {
                text-shadow: 0 0 15px rgba(255, 215, 0, 1), 0 0 20px rgba(255, 215, 0, 0.8);
            }
        }
        
        .back-btn {
            padding: 8px 16px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
            background-color: #3498db;
            color: white;
            text-decoration: none;
        }
        
        .back-btn:hover {
            background-color: #2980b9;
        }
        
        .profile-content {
            display: flex;
            padding: 0;
        }
        
        .sidebar {
            width: 250px;
            background-color: #f8f9fa;
            padding: 20px;
            border-right: 1px solid #e9ecef;
        }
        
        .sidebar-menu {
            list-style: none;
        }
        
        .sidebar-item {
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        
        .sidebar-item.active {
            background-color: #e3f2fd;
            color: #1976d2;
            font-weight: 500;
        }
        
        .sidebar-item:hover:not(.active) {
            background-color: #e9ecef;
        }
        
        .sidebar-item i {
            width: 20px;
            text-align: center;
        }
        
        .main-content {
            flex: 1;
            padding: 25px;
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .avatar-container {
            position: relative;
            margin-right: 20px;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #e9ecef;
        }
        
        .avatar-overlay {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background-color: #3498db;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
        }
        
        .profile-info h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        
        .profile-info p {
            color: #7f8c8d;
            margin-bottom: 10px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1.3rem;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
        }
        
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            flex: 1;
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2c3e50;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }
        
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background-color: #3498db;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #2980b9;
        }
        
        .btn-secondary {
            background-color: #e9ecef;
            color: #2c3e50;
        }
        
        .btn-secondary:hover {
            background-color: #dee2e6;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px;
            border-radius: 5px;
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            display: none;
            animation: slideIn 0.3s ease-out;
        }
        
        .notification.error {
            background-color: #e74c3c;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-left: 10px;
        }
        
        .badge-primary {
            background-color: #e1f5fe;
            color: #01579b;
        }
        
        .badge-success {
            background-color: #e8f5e9;
            color: #2e7d32;
        }
        
        .badge-warning {
            background-color: #fff8e1;
            color: #f57f17;
        }
        
        @media (max-width: 768px) {
            .profile-content {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e9ecef;
            }
            
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            
            .avatar-container {
                margin-right: 0;
                margin-bottom: 15px;
            }
            
            .stats {
                justify-content: center;
            }
            
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .logo-container {
                position: static;
                transform: none;
                justify-content: center;
                margin: 10px 0;
            }
            
        }
    </style>
</head>
<body>
    <div class="notification" id="notification">
        <i class="fas fa-check-circle"></i> <span id="notificationText">Profile updated successfully!</span>
    </div>
    
    <div class="container">
        <header>
            <div class="logo-container">
                <div class="street-light-logo">
                    <i class="fas fa-lightbulb street-light-icon"></i>
                </div>
                <div class="logo">
                    <i class="fas fa-lamp"></i>
                    <h1>GROUND ZERO</h1>
                </div>
            </div>
            
            <a href="best3.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to App
            </a>
        </header>
        
        <div class="profile-content">
            <div class="sidebar">
                <ul class="sidebar-menu">
                    <li class="sidebar-item active">
                        <i class="fas fa-user"></i>
                        <span>Personal Information</span>
                    </li>
                    <li class="sidebar-item">
                        <i class="fas fa-shield-alt"></i>
                        <span>Security</span>
                    </li>
                    <li class="sidebar-item">
                        <i class="fas fa-bell"></i>
                        <span>Notifications</span>
                    </li>
                    <li class="sidebar-item">
                        <i class="fas fa-chart-bar"></i>
                        <span>Reports & Analytics</span>
                    </li>
                    <li class="sidebar-item">
                        <i class="fas fa-cog"></i>
                        <span>Preferences</span>
                    </li>
                </ul>
            </div>
            
            <div class="main-content">
                <div class="profile-header">
                    <div class="avatar-container">
                        <img src="https://cdn.pixabay.com/photo/2018/04/18/18/56/user-3331256_640.png" alt="Profile Avatar" class="avatar" id="profileAvatar">
                        <div class="avatar-overlay" onclick="document.getElementById('avatarInput').click()">
                            <i class="fas fa-camera"></i>
                        </div>
                        <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                    </div>
                    <div class="profile-info">
                        <h2 id="profileName">User Name</h2> <!-- Changed from John Doe to User Name -->
                        <p>Road Inspector <span class="badge badge-primary">Pro Account</span></p>
                        <p><i class="fas fa-map-marker-alt"></i> New York, USA</p>
                        <div class="stats">
                            <div class="stat-item">
                                <div class="stat-value">42</div>
                                <div class="stat-label">Reports</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">36</div>
                                <div class="stat-label">Verified</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">89%</div>
                                <div class="stat-label">Accuracy</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="section">
                    <h3 class="section-title">Personal Information</h3>
                    <form id="profileForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">First Name</label>
                                <input type="text" id="firstName" value="User" required> <!-- Changed from John to User -->
                            </div>
                            <div class="form-group">
                                <label for="lastName">Last Name</label>
                                <input type="text" id="lastName" value="Name" required> <!-- Changed from Doe to Name -->
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" value="user.name@example.com" required> <!-- Changed email -->
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone Number</label>
                                <input type="tel" id="phone" value="+1 (555) 123-4567">
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="jobTitle">Job Title</label>
                                <input type="text" id="jobTitle" value="Road Inspector">
                            </div>
                            <div class="form-group">
                                <label for="organization">Organization</label>
                                <input type="text" id="organization" value="Department of Transportation">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="bio">Bio</label>
                            <textarea id="bio" rows="4">Experienced road inspector with over 5 years of expertise in identifying and reporting road damage. Passionate about improving road safety and infrastructure quality.</textarea>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="address">Address</label>
                                <input type="text" id="address" value="123 Main Street">
                            </div>
                            <div class="form-group">
                                <label for="city">City</label>
                                <input type="text" id="city" value="New York">
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="state">State</label>
                                <input type="text" id="state" value="New York">
                            </div>
                            <div class="form-group">
                                <label for="zipCode">ZIP Code</label>
                                <input type="text" id="zipCode" value="10001">
                            </div>
                        </div>
                        
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" id="cancelBtn">
                                <i class="fas fa-times"></i> Cancel
                            </button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- ✅ FIXED SCRIPT -->
    <script>
        // Load user data from localStorage
        function loadUserData() {
            const userData = localStorage.getItem('user');
            if (userData) {
                const user = JSON.parse(userData);
                
                // Populate form fields with user data
                document.getElementById('firstName').value = user.firstName || 'User';
                document.getElementById('lastName').value = user.lastName || 'Name';
                document.getElementById('email').value = user.email || 'user.name@example.com';
                document.getElementById('phone').value = user.phone || '+91 99988 78665';
                document.getElementById('jobTitle').value = user.jobTitle || 'Road Inspector';
                document.getElementById('organization').value = user.organization || 'Department of Transportation';
                document.getElementById('bio').value = user.bio || 'Experienced road inspector with over 5 years of expertise in identifying and reporting road damage. Passionate about improving road safety and infrastructure quality.';
                document.getElementById('address').value = user.address || '123 Main Street';
                document.getElementById('city').value = user.city || 'New Delhi';
                document.getElementById('state').value = user.state || 'New Delhi';
                document.getElementById('zipCode').value = user.zipCode || '110042';
                
                // Update profile name
                document.getElementById('profileName').textContent = `${user.firstName || 'User'} ${user.lastName || 'Name'}`;
                
                // Update avatar if available
                if (user.avatar) {
                    document.getElementById('profileAvatar').src = user.avatar;
                }
            }
        }
        
        // Save user data to localStorage
        function saveUserData() {
            const user = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                jobTitle: document.getElementById('jobTitle').value,
                organization: document.getElementById('organization').value,
                bio: document.getElementById('bio').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                zipCode: document.getElementById('zipCode').value,
                avatar: document.getElementById('profileAvatar').src,
                loggedIn: true   // ✅ Fix: keep user logged in
            };
            
            localStorage.setItem('user', JSON.stringify(user));
        }
        
        // Show notification function
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            const notificationText = document.getElementById('notificationText');
            
            notificationText.textContent = message;
            
            if (type === 'error') {
                notification.classList.add('error');
            } else {
                notification.classList.remove('error');
            }
            
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
        
        // Handle form submission
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            saveUserData();
            showNotification('Profile updated successfully!');
            
            // Update profile header name
            document.getElementById('profileName').textContent = `${document.getElementById('firstName').value} ${document.getElementById('lastName').value}`;
        });
        
        // Handle cancel button
        document.getElementById('cancelBtn').addEventListener('click', function() {
            loadUserData();
            showNotification('Changes discarded', 'error');
        });
        
        // Handle avatar upload
        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('profileAvatar').src = event.target.result;
                    saveUserData();
                }
                reader.readAsDataURL(file);
            }
        });
        
        // Load user data on page load
        window.onload = loadUserData;
    </script>
</body>
</html>
